<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" href="https://thatopen.github.io/engine_components/resources/favicon.ico" />
  <title>BIM Viewer — That Open Company</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a0a;
      --white: #fafafa;
      --gray: #6e6e73;
      --accent: #1a6cff;
      --nav-height: 64px;
    }

    body {
      font-family: 'Sora', sans-serif;
      background: var(--black);
      color: var(--white);
      overflow: hidden;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      height: var(--nav-height);
      background: rgba(10,10,10,0.72);
      backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .nav-logo img { height: 28px; width: auto; }

    .nav-logo span {
      font-size: 15px;
      font-weight: 500;
      color: var(--white);
      letter-spacing: -0.01em;
    }

    .nav-back {
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
    }

    .nav-back:hover { color: var(--white); }

    /* VIEWER */
    #container {
      position: fixed;
      top: var(--nav-height);
      left: 0;
      right: 0;
      bottom: 0;
      width: 100vw;
      height: calc(100vh - var(--nav-height));
      overflow: hidden;
    }

    /* BIM UI PANEL */
    .options-menu {
      position: fixed;
      min-width: unset;
      top: calc(var(--nav-height) + 12px);
      right: 12px;
      max-height: calc(100vh - var(--nav-height) - 24px);
      z-index: 100;
    }

    .phone-menu-toggler {
      visibility: hidden;
    }

    @media (max-width: 768px) {
      nav { padding: 0 24px; }

      .options-menu {
        visibility: hidden;
        bottom: 12px;
        left: 12px;
        top: unset;
        right: unset;
      }

      .options-menu-visible {
        visibility: visible;
      }

      .phone-menu-toggler {
        visibility: visible;
        position: fixed;
        bottom: 12px;
        right: 12px;
        z-index: 100;
      }
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="/">
      <img src="https://thatopen.github.io/engine_components/resources/favicon.ico" alt="That Open Company" />
      <span>That Open Company</span>
    </a>
    <a class="nav-back" href="/">← Back to home</a>
  </nav>

  <div id="container"></div>

  <script type="module" src="/src/viewer.ts"></script>
</body>
</html>
